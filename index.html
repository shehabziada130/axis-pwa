<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Axis">
<meta name="description" content="The time budget for people who lose track of time.">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<title>Axis — One Thing at a Time</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#252530;
  --border:#2a2a3a;--text:#f0f0f8;--muted:#6b6b85;
  --accent:#7c6df0;--accent2:#a08df5;
  --green:#3dd68c;--amber:#f5a623;--red:#f04747;--radius:16px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--bg)}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;transition:opacity .5s ease}
#splash.hidden{opacity:0;pointer-events:none}
.splash-icon{width:84px;height:84px;animation:axpulse 2s ease infinite}
@keyframes axpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.95)}}
.splash-name{font-size:34px;font-weight:800;letter-spacing:-1px}
.splash-slogan{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;padding:0 18px;padding-top:calc(var(--safe-top)+10px)}
.screen.active{display:flex}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
.bottom-nav{display:flex;justify-content:space-around;padding:10px 0;padding-bottom:calc(var(--safe-bottom)+8px);border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.nav-btn{background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 14px;border-radius:10px;transition:.15s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
.btn{border:none;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;user-select:none;-webkit-user-select:none}
.btn:active{transform:scale(.95)}
.btn-primary{background:var(--accent);color:#fff;padding:13px 18px;font-size:14px}
.btn-secondary{background:var(--surface2);color:var(--text);padding:13px 16px;font-size:14px;border:1px solid var(--border)}
.btn-danger{background:rgba(240,71,71,.12);color:var(--red);border:1px solid rgba(240,71,71,.25);padding:11px 14px;font-size:13px}
.btn-success{background:rgba(61,214,140,.12);color:var(--green);border:1px solid rgba(61,214,140,.25);padding:11px 14px;font-size:13px}
.btn-sm{padding:9px 13px;font-size:12px;border-radius:10px}
.btn-ghost{background:transparent;color:var(--muted);padding:9px 13px;font-size:12px;border:1px solid var(--border)}
.btn-full{width:100%}
.btn-amber{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.25);padding:11px 14px;font-size:13px}
.focus-header{text-align:center;padding:12px 0 8px;flex-shrink:0}
.focus-status{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.focus-task{font-size:22px;font-weight:800;line-height:1.2}
.focus-times{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px}
.timer-ring-wrap{display:flex;justify-content:center;align-items:center;margin:6px 0;position:relative;flex-shrink:0}
.timer-ring-wrap svg{transform:rotate(-90deg)}
circle.track{fill:none;stroke:var(--surface2);stroke-width:12}
circle.prog{fill:none;stroke:var(--accent);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 1s linear;stroke-dasharray:565;stroke-dashoffset:0}
.timer-center{position:absolute;text-align:center}
.timer-big{font-size:44px;font-weight:800;letter-spacing:-2px;font-family:'DM Mono',monospace}
.timer-sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:2px;text-transform:uppercase}
.next-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;margin-bottom:9px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.next-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.next-name{font-size:14px;font-weight:700}
.next-time{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.next-icon{width:34px;height:34px;background:var(--surface2);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:19px}
.action-row{display:flex;gap:8px;margin-bottom:8px;flex-shrink:0}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;flex-shrink:0}
.behind-banner{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.3);border-radius:14px;padding:10px 13px;margin-bottom:9px;cursor:pointer;flex-shrink:0}
.behind-title{font-size:13px;font-weight:700;color:var(--amber);margin-bottom:2px}
.behind-sub{font-size:11px;color:var(--muted)}
.screen-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0}
.screen-title{font-size:19px;font-weight:800}
.timeline{display:flex;flex-direction:column;gap:0}
.tl-row{display:flex;gap:0;align-items:stretch}
.tl-spine{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;margin-top:16px;position:relative;z-index:1}
.tl-dot.active{background:var(--accent);box-shadow:0 0 0 3px rgba(124,109,240,.25)}
.tl-dot.done{background:var(--green)}
.tl-line{width:2px;background:var(--border);flex:1;margin-top:0}
.tl-line.done{background:var(--green)}
.tl-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:11px 12px;margin-bottom:6px;min-width:0;transition:.15s}
.tl-card.active{border-color:var(--accent);background:rgba(124,109,240,.07)}
.tl-card.done-card{opacity:.38}
.tl-card.selected-card{border-color:var(--green);background:rgba(61,214,140,.06)}
.tl-card-top{display:flex;align-items:center;gap:8px}
.tl-emoji{font-size:18px;flex-shrink:0}
.tl-info{flex:1;min-width:0}
.tl-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-time{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.tl-actions{display:flex;gap:4px;flex-shrink:0}
.gap-row{display:flex;align-items:center;gap:8px;padding:4px 0 4px 36px;margin-bottom:2px}
.gap-pill{background:rgba(245,166,35,.1);border:1px dashed rgba(245,166,35,.35);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--amber);font-family:'DM Mono',monospace;cursor:pointer;display:flex;align-items:center;gap:5px}
.icon-btn{background:var(--surface2);border:none;color:var(--muted);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.select-check{width:20px;height:20px;border-radius:6px;background:var(--surface3);border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:.15s}
.select-check.on{background:var(--green);border-color:var(--green);color:#fff}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:flex-end;justify-content:center;z-index:100;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:22px 18px;width:100%;max-width:480px;padding-bottom:calc(var(--safe-bottom)+20px);animation:slideUp .22s ease;max-height:92vh;overflow-y:auto;margin-top:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:800;margin-bottom:14px}
.modal-section{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:14px 0 8px}
.input-field{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;padding:11px 13px;width:100%;margin-bottom:9px;outline:none;-webkit-appearance:none}
.input-field:focus{border-color:var(--accent)}
.input-row{display:flex;gap:8px;margin-bottom:9px;align-items:center}
.input-label{font-size:11px;color:var(--muted);width:72px;flex-shrink:0;font-weight:600;letter-spacing:.3px}
select.input-field option{background:#1c1c26}
.hint-box{background:var(--surface2);border-left:3px solid var(--accent);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5}
.hint-box.amber{border-color:var(--amber);color:var(--amber)}
.hint-box.green{border-color:var(--green);color:var(--green)}
.hint-box.red{border-color:var(--red);color:var(--red)}
.conflict-option,.recovery-option{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:.15s}
.conflict-option:active,.recovery-option:active{border-color:var(--accent)}
.conflict-option h4,.recovery-option h4{font-size:13px;font-weight:700;margin-bottom:2px}
.conflict-option p,.recovery-option p{font-size:11px;color:var(--muted);line-height:1.4}
.template-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:9px}
.template-card h3{font-size:14px;font-weight:700;margin-bottom:5px}
.template-preview{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:5px;line-height:1.7}
.apply-task-row{background:var(--surface2);border-radius:10px;padding:9px 11px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.apply-task-row .aemoji{font-size:16px;flex-shrink:0}
.apply-task-row .aname{font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.apply-task-row .aname-input{background:var(--surface3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;flex:1;padding:5px 7px;outline:none;min-width:0}
.apply-task-row .aname-input:focus{border-color:var(--accent)}
.apply-task-row .adur{background:var(--surface3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;width:52px;padding:5px 7px;text-align:center;outline:none}
.apply-task-row .adur:focus{border-color:var(--accent)}
.apply-task-dup,.apply-task-del{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 2px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px;padding:40px 20px}
.empty-icon{font-size:48px;opacity:.32}
.empty-title{font-size:16px;font-weight:700;color:var(--muted)}
.empty-sub{font-size:12px;color:var(--muted);line-height:1.5;max-width:230px}
.divider{height:1px;background:var(--border);margin:12px 0;flex-shrink:0}
.section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:9px}
.day-done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:13px;padding:40px}
.day-done h2{font-size:24px;font-weight:800}
.day-done p{font-size:13px;color:var(--muted);line-height:1.5}
.install-banner{background:rgba(124,109,240,.1);border:1px solid rgba(124,109,240,.25);border-radius:14px;padding:10px 13px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.install-banner p{font-size:12px;color:var(--accent2);flex:1;line-height:1.4}
.install-banner button{background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:7px 12px;cursor:pointer;flex-shrink:0}
.notif-banner{background:rgba(61,214,140,.07);border:1px solid rgba(61,214,140,.22);border-radius:14px;padding:10px 13px;margin-bottom:9px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.notif-banner p{font-size:12px;color:var(--green);flex:1;line-height:1.4}
.notif-banner button{background:var(--green);color:#0a0a0f;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:7px 12px;cursor:pointer;flex-shrink:0}
.future-note{background:var(--surface2);border:1px dashed var(--border);border-radius:10px;padding:10px 14px;margin-top:6px;font-size:12px;color:var(--muted);line-height:1.5}
.future-note strong{color:var(--text)}
/* In-app toast for gap warnings */
#gap-toast{position:fixed;top:calc(var(--safe-top)+14px);left:50%;transform:translateX(-50%);background:rgba(245,166,35,.92);color:#0a0a0f;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:10px 18px;border-radius:20px;z-index:200;display:none;max-width:340px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#gap-toast.show{display:block;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div id="gap-toast"></div>
<div id="splash">
  <svg class="splash-icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <rect width="512" height="512" rx="112" fill="#0a0a0f"/>
    <circle cx="256" cy="256" r="180" fill="none" stroke="#7c6df0" stroke-width="18"/>
    <circle cx="256" cy="256" r="110" fill="none" stroke="#7c6df0" stroke-width="10" stroke-dasharray="20 14"/>
    <circle cx="256" cy="256" r="32" fill="#7c6df0"/>
    <line x1="256" y1="56" x2="256" y2="160" stroke="#7c6df0" stroke-width="14" stroke-linecap="round"/>
    <line x1="256" y1="352" x2="256" y2="456" stroke="#7c6df0" stroke-width="14" stroke-linecap="round"/>
    <line x1="56" y1="256" x2="160" y2="256" stroke="#7c6df0" stroke-width="14" stroke-linecap="round"/>
    <line x1="352" y1="256" x2="456" y2="256" stroke="#7c6df0" stroke-width="14" stroke-linecap="round"/>
    <circle cx="256" cy="256" r="10" fill="#fff"/>
  </svg>
  <div class="splash-name">Axis</div>
  <div class="splash-slogan">One Thing at a Time</div>
</div>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
const EMOJIS={'wake up':'🌅','sleep':'🌙','breakfast':'🍳','lunch':'🥗','dinner':'🍽️',
  'plan':'📋','study':'📚','work':'💼','break':'☕','workout':'🏋️','exercise':'🚴',
  'reading':'📖','meeting':'🤝','shower':'🚿','walk':'🚶','meditation':'🧘',
  'prayer':'🤲','call':'📞','email':'📧','writing':'✍️','coding':'💻','exam':'📝',
  'gym':'🏋️','commute':'🚗','cook':'👨‍🍳','clean':'🧹','nap':'😴'};
function emoji(n){const l=n.toLowerCase();for(const k in EMOJIS)if(l.includes(k))return EMOJIS[k];return'⏱️'}
function ld(k){try{const d=localStorage.getItem(k);return d?JSON.parse(d):null}catch{return null}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function nowSec(){return Math.floor(Date.now()/1000)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function uid(){return Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function fmt(sec){if(sec<=0)return'0:00';const m=Math.floor(sec/60),s=sec%60;return m+':'+(s<10?'0':'')+s}
function fmtMins(min){if(!min||min<=0)return'0m';return min>=60?Math.floor(min/60)+'h'+(min%60?' '+min%60+'m':''):min+'m'}
function fmtTime(ts){if(!ts)return'--:--';const d=new Date(ts*1000),h=d.getHours(),m=d.getMinutes();return(h<10?'0':'')+h+':'+(m<10?'0':'')+m}
function toTimeStr(ts){if(!ts)return'';const d=new Date(ts*1000),h=d.getHours(),m=d.getMinutes();return(h<10?'0':'')+h+':'+(m<10?'0':'')+m}
function parseTime(str){
  if(!str||!str.includes(':'))return null;
  const[hh,mm]=str.split(':').map(Number);
  if(isNaN(hh)||isNaN(mm))return null;
  const d=new Date();d.setHours(hh,mm,0,0);return Math.floor(d.getTime()/1000)
}
function nowTimeStr(){const d=new Date(),h=d.getHours(),m=d.getMinutes();return(h<10?'0':'')+h+':'+(m<10?'0':'')+m}

// Compute absolute scheduled start/end for every task
// Each task starts right when the previous ends; first task uses its own startAt
function scheduleTimes(tasks){
  const out=[];
  let cursor=tasks.length&&tasks[0].startAt?tasks[0].startAt:null;
  for(let i=0;i<tasks.length;i++){
    if(i===0)cursor=tasks[0].startAt||null;
    else cursor=out[i-1]?out[i-1].end:null;
    out.push({start:cursor,end:cursor!=null?cursor+tasks[i].dur*60:null});
  }
  return out;
}

// Find gaps (>30s) between consecutive tasks that have scheduled times
function findGaps(tasks){
  const times=scheduleTimes(tasks);const gaps=[];
  for(let i=0;i<tasks.length-1;i++){
    const a=times[i],b=times[i+1];
    if(a&&b&&a.end!=null&&b.start!=null&&b.start>a.end+30)
      gaps.push({afterIdx:i,gapSec:b.start-a.end});
  }
  return gaps;
}

// ═══════════════════════════════════════════════════════════════
//  DEFAULT TEMPLATES
// ═══════════════════════════════════════════════════════════════
const DEFAULT_TEMPLATES=[
  {id:'t1',name:'Full Day',tasks:[
    {name:'Plan Your Day',dur:10},{name:'Wake Up',dur:10},{name:'Breakfast',dur:20},{name:'Study',dur:90},
    {name:'Break',dur:15},{name:'Workout',dur:45},{name:'Lunch',dur:30},
    {name:'Reading',dur:30},{name:'Dinner',dur:30},{name:'Sleep',dur:480}]},
  {id:'t2',name:'Work Day',tasks:[
    {name:'Plan Your Day',dur:10},{name:'Wake Up',dur:10},{name:'Breakfast',dur:20},{name:'Work',dur:120},
    {name:'Break',dur:15},{name:'Work',dur:120},{name:'Lunch',dur:45},
    {name:'Work',dur:90},{name:'Break',dur:15},{name:'Dinner',dur:30},
    {name:'Reading',dur:20},{name:'Sleep',dur:480}]},
  {id:'t3',name:'Rest Day',tasks:[
    {name:'Plan Your Day',dur:10},{name:'Wake Up',dur:10},{name:'Breakfast',dur:30},{name:'Walk',dur:60},
    {name:'Reading',dur:60},{name:'Lunch',dur:45},{name:'Meditation',dur:30},
    {name:'Dinner',dur:45},{name:'Sleep',dur:480}]}
];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let S={
  screen:'focus',today:null,tomorrow:null,
  templates:ld('templates')||DEFAULT_TEMPLATES,
  paused:false,pausedAt:null,pausedSecondsLeft:null,
  currentIdx:0,recoveryShown:false,
  selectMode:false,selectedTasks:new Set(),
  notifGranted:false
};
let deferredInstall=null,tickInterval=null,lastNotifTask=null;
let M={
  editIdx:-1,insertAfterIdx:-1,fromTab:'focus',
  applyTmplIdx:-1,applyTasks:[],applyTarget:'today',
  conflictPending:null,newTmplTasks:[]
};
let _buildTasks=[],_newTmplTasks=[];

function initState(){
  const saved=ld('today');
  if(saved&&saved.date===todayStr()){
    S.today=saved;S.currentIdx=saved.currentIdx||0;
    S.paused=saved.paused||false;S.pausedAt=saved.pausedAt||null;
    S.pausedSecondsLeft=saved.pausedSecondsLeft!=null?saved.pausedSecondsLeft:null;
  }
  S.tomorrow=ld('tomorrow');
  S.notifGranted=!!(window.Notification&&Notification.permission==='granted');
}
function saveToday(){
  if(!S.today)return;
  sv('today',{...S.today,date:todayStr(),currentIdx:S.currentIdx,
    paused:S.paused,pausedAt:S.pausedAt,pausedSecondsLeft:S.pausedSecondsLeft});
}
function cur(){return S.today?S.today.tasks[S.currentIdx]||null:null}
function nxt(){return S.today?S.today.tasks[S.currentIdx+1]||null:null}
function getSecondsLeft(){
  const t=cur();if(!t)return 0;
  if(S.paused&&S.pausedSecondsLeft!=null)return S.pausedSecondsLeft;
  if(!t.startAt)return t.dur*60;
  return Math.max(0,t.dur*60-(nowSec()-t.startAt));
}
function getSecondsBehind(){
  if(!S.today||!S.today.tasks.length||!S.today.startedAt)return 0;
  const t=cur();if(!t||!t.startAt)return 0;
  let planned=S.today.startedAt;
  for(let i=0;i<S.currentIdx;i++)planned+=S.today.tasks[i].dur*60;
  return Math.max(0,t.startAt-planned);
}
function startCurrentTask(){
  const t=cur();if(!t)return;
  t.startAt=nowSec();S.paused=false;S.pausedAt=null;S.pausedSecondsLeft=null;saveToday();
}
function advanceTask(){
  if(!S.today)return;
  const t=cur();if(t)t.done=true;
  S.currentIdx++;S.recoveryShown=false;
  if(S.currentIdx>=S.today.tasks.length){saveToday();render();return;}
  const next=cur();
  if(next&&next.name.toLowerCase()==='sleep'){next.startAt=nowSec();saveToday();render();return;}
  startCurrentTask();saveToday();render();
}

// ═══════════════════════════════════════════════════════════════
//  NOTIFICATIONS — send via SW for pop-up, fallback to browser
// ═══════════════════════════════════════════════════════════════
async function requestNotifPermission(){
  if(!('Notification' in window))return;
  const p=await Notification.requestPermission();
  S.notifGranted=(p==='granted');render();
}
function sendNotif(title,body){
  if(!S.notifGranted||!('Notification' in window))return;
  try{
    // Route through Service Worker so it shows as a pop-up system notification
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({type:'SHOW_NOTIF',title,body});
    } else if(navigator.serviceWorker){
      navigator.serviceWorker.ready.then(reg=>{
        reg.showNotification(title,{
          body,icon:'./icon-192.png',badge:'./icon-192.png',
          vibrate:[300,100,300,100,300],
          tag:'axis-task',renotify:true,
          requireInteraction:false,silent:false
        });
      });
    } else {
      new Notification(title,{body,icon:'./icon-192.png'});
    }
  }catch(e){
    try{new Notification(title,{body});}catch(e2){}
  }
}

// In-app toast (for gap warnings while app is open)
function showToast(msg,duration=4000){
  const el=document.getElementById('gap-toast');
  if(!el)return;
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),duration);
}
function checkAndNotifyGaps(tasks){
  const gaps=findGaps(tasks);if(!gaps.length)return;
  const total=gaps.reduce((a,g)=>a+g.gapSec,0);
  if(total<60)return;
  const mins=Math.round(total/60);
  showToast(`⏳ ${fmtMins(mins)} without a task — check Today tab`);
}

// ── FOCUS ─────────────────────────────────────────────────────
function renderFocus(){
  const t=cur(),next=nxt();
  const isDone=S.today&&S.currentIdx>=S.today.tasks.length;
  const isSleep=t&&t.name.toLowerCase()==='sleep';
  const behind=getSecondsBehind();
  if(isDone) return `<div class="screen active"><div class="day-done">
    <div style="font-size:56px">🌙</div><h2>Day Complete</h2>
    <p>Great work. Rest well.<br>Plan tomorrow from the Plan tab.</p>
    <button class="btn btn-primary" onclick="go('plan')" style="margin-top:10px">Plan Tomorrow →</button>
  </div></div>`;
  if(!S.today||!S.today.tasks.length) return `<div class="screen active">
    <div class="focus-header">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px">
        ${axisIcon(24)}<span style="font-size:20px;font-weight:800;letter-spacing:-.5px">Axis</span>
      </div>
      <div style="font-size:12px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase">One Thing at a Time</div>
    </div>
    <div class="empty-state">
      <div class="empty-icon">📋</div><div class="empty-title">No schedule yet</div>
      <div class="empty-sub">Every minute has a job. Start planning.</div>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center">
        <button class="btn btn-primary btn-sm" onclick="openAdd('focus')">+ Add Task</button>
        <button class="btn btn-ghost btn-sm" onclick="go('plan')">Build Schedule</button>
      </div>
    </div>
  </div>`;
  if(isSleep) return `<div class="screen active"><div class="day-done">
    <div style="font-size:56px">🌙</div>
    <div style="font-size:18px;font-weight:700">Sleep time</div>
    <div style="font-size:13px;color:var(--muted)">Rest well. Tomorrow is waiting.</div>
    ${S.tomorrow&&S.tomorrow.tasks&&S.tomorrow.tasks.length
      ?`<button class="btn btn-primary" onclick="startTomorrow()" style="margin-top:10px">Wake Up — Start Tomorrow</button>`
      :`<button class="btn btn-primary" onclick="go('plan')" style="margin-top:10px">Plan Tomorrow</button>`}
  </div></div>`;
  const sec=getSecondsLeft(),totalSec=t?t.dur*60:1;
  const progress=Math.max(0,Math.min(1,1-(sec/totalSec)));
  const offset=565-(progress*565);
  const ringColor=sec<120?'var(--red)':sec<300?'var(--amber)':'var(--accent)';
  const times=scheduleTimes(S.today.tasks);
  const ct=times[S.currentIdx];
  const nt=nxt()&&times[S.currentIdx+1]?times[S.currentIdx+1]:null;
  return `<div class="screen active" style="padding-top:calc(var(--safe-top)+4px)">
    <div class="focus-header">
      <div class="focus-status">${S.paused?'PAUSED':'NOW DOING'}</div>
      <div class="focus-task">${t.name}</div>
      <div class="focus-times">${ct&&ct.start?fmtTime(ct.start)+' → '+fmtTime(ct.end):'--:-- → --:--'} · ${fmtMins(t.dur)}</div>
    </div>
    ${behind>120&&!S.recoveryShown?`<div class="behind-banner" onclick="openRecovery()">
      <div class="behind-title">⚠️ ${Math.round(behind/60)} min behind</div>
      <div class="behind-sub">Tap to choose how to recover →</div>
    </div>`:''}
    ${!S.notifGranted?`<div class="notif-banner">
      <p>Enable notifications for task alerts.</p>
      <button onclick="requestNotifPermission()">Enable</button>
    </div>`:''}
    <div class="timer-ring-wrap">
      <svg width="186" height="186" viewBox="0 0 200 200">
        <circle class="track" cx="100" cy="100" r="90"/>
        <circle class="prog" id="ring-prog" cx="100" cy="100" r="90"
          style="stroke:${ringColor};stroke-dashoffset:${offset}"/>
      </svg>
      <div class="timer-center">
        <div class="timer-big" id="timer-display">${fmt(sec)}</div>
        <div class="timer-sub">${S.paused?'PAUSED':'REMAINING'}</div>
      </div>
    </div>
    ${next?`<div class="next-card">
      <div class="next-icon">${emoji(next.name)}</div>
      <div><div class="next-label">Up Next</div>
      <div class="next-name">${next.name}</div>
      <div class="next-time">${nt&&nt.start?fmtTime(nt.start)+' → '+fmtTime(nt.end)+' · ':''} ${fmtMins(next.dur)}</div></div>
    </div>`:`<div style="height:8px"></div>`}
    <div class="action-row">
      ${S.paused
        ?`<button class="btn btn-primary" style="flex:1" onclick="resumeTask()">▶ Resume</button>`
        :`<button class="btn btn-primary" style="flex:1" onclick="pauseTask()">⏸ Pause</button>`}
      <button class="btn btn-secondary btn-sm" onclick="skipTask()">Skip →</button>
    </div>
    <div class="quick-actions">
      <button class="btn btn-success" onclick="endEarly()">✓ Done Early</button>
      <button class="btn btn-ghost" onclick="openAdd('focus')">+ Insert Task</button>
    </div>
  </div>`;
}

// ── SCHEDULE / TODAY ──────────────────────────────────────────
function renderSchedule(){
  if(!S.today||!S.today.tasks.length) return `<div class="screen active">
    <div class="screen-header"><span class="screen-title">Today</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="openAdd('schedule')">+ Task</button>
        <button class="btn btn-primary btn-sm" onclick="go('plan')">Build</button>
      </div>
    </div>
    <div class="empty-state"><div class="empty-icon">📋</div>
    <div class="empty-title">No tasks yet</div>
    <div class="empty-sub">Add a task or build a full schedule.</div></div>
  </div>`;
  const tasks=S.today.tasks;
  const times=scheduleTimes(tasks);
  const gaps=findGaps(tasks);
  const gapMap={};gaps.forEach(g=>gapMap[g.afterIdx]=g);
  const selCount=S.selectedTasks.size;
  return `<div class="screen active">
    <div class="screen-header">
      <span class="screen-title">Today</span>
      <div style="display:flex;gap:5px">
        ${S.selectMode
          ?`<button class="btn btn-success btn-sm" onclick="saveSelectedAsTemplate()" ${selCount<1?'style="opacity:.4"':''}>Save (${selCount})</button>
             <button class="btn btn-ghost btn-sm" onclick="exitSelectMode()">✕</button>`
          :`<button class="btn btn-ghost btn-sm" onclick="enterSelectMode()">☑ Select</button>
             <button class="btn btn-primary btn-sm" onclick="openAdd('schedule')">+ Add</button>`}
      </div>
    </div>
    ${S.selectMode?`<div class="hint-box" style="margin-bottom:10px;flex-shrink:0">Tap tasks to select, then save as a template.</div>`:''}
    <div class="scroll-area">
      <div class="timeline">
        ${tasks.map((t,i)=>{
          const ts=times[i];
          const startStr=ts&&ts.start?fmtTime(ts.start):'--:--';
          const endStr=ts&&ts.end?fmtTime(ts.end):'--:--';
          const isLast=i===tasks.length-1;
          const isSel=S.selectedTasks.has(i);
          const gap=gapMap[i];
          return `<div class="tl-row">
            <div class="tl-spine">
              <div class="tl-dot ${i===S.currentIdx?'active':t.done?'done':''}"></div>
              ${!isLast?`<div class="tl-line ${t.done?'done':''}"></div>`:''}
            </div>
            <div style="flex:1;padding-left:6px;padding-bottom:6px">
              <div class="tl-card ${i===S.currentIdx?'active':''} ${t.done?'done-card':''} ${S.selectMode&&isSel?'selected-card':''}"
                onclick="${S.selectMode?`toggleSelect(${i})`:''}" style="${S.selectMode?'cursor:pointer':''}">
                <div class="tl-card-top">
                  ${S.selectMode?`<div class="select-check ${isSel?'on':''}">${isSel?'✓':''}</div>`:''}
                  <div class="tl-emoji">${emoji(t.name)}</div>
                  <div class="tl-info">
                    <div class="tl-name">${t.name}</div>
                    <div class="tl-time">${startStr} → ${endStr} · ${fmtMins(t.dur)}</div>
                  </div>
                  ${!S.selectMode&&!t.done?`<div class="tl-actions">
                    <button class="icon-btn" onclick="openEditTask(${i})" title="Edit">✏️</button>
                    <button class="icon-btn" onclick="dupTask(${i})" title="Duplicate">⧉</button>
                    <button class="icon-btn" onclick="delTask(${i})" title="Delete">🗑</button>
                  </div>`:''}
                </div>
              </div>
              ${gap?`<div class="gap-row">
                <div class="gap-pill" onclick="openAdd('schedule',${i+1})">
                  ⏳ ${fmtMins(Math.round(gap.gapSec/60))} free — tap to fill
                </div>
              </div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

/*
  openAdd(fromTab, insertAfterIdx?)
  fromTab: 'focus' | 'schedule' | 'plan_today' | 'plan_tomorrow'
  - Always shows start / end / duration fields
  - Always shows template quick-add buttons at bottom
  - When fromTab='schedule', shows insert-position selector
  - Default start = NOW so every minute has a job
*/
function openAdd(fromTab, insertAfterIdx){
  M.editIdx=-1;
  M.fromTab=fromTab;

  // Determine default insertAfterIdx
  if(insertAfterIdx!=null){
    // Called from gap-pill: insert at the given position
    M.insertAfterIdx=insertAfterIdx-1; // gap-pill passes the position AFTER the gap
  } else {
    // Default: append at end
    M.insertAfterIdx=S.today&&S.today.tasks.length?S.today.tasks.length-1:-1;
  }

  document.getElementById('addModalTitle').textContent='Add Task';
  document.getElementById('am_name').value='';
  document.getElementById('am_dur').value='';
  document.getElementById('am_hint').style.display='none';

  // Default start = NOW (every minute counts)
  document.getElementById('am_start').value=nowTimeStr();
  document.getElementById('am_end').value='';

  // Insert-position selector
  const insertRow=document.getElementById('am_insert_row');
  if((fromTab==='schedule'||fromTab==='focus')&&S.today&&S.today.tasks.length){
    insertRow.style.display='block';
    const sel=document.getElementById('am_after');
    sel.innerHTML='<option value="-1">At the beginning</option>';
    S.today.tasks.forEach((t,i)=>{
      const o=document.createElement('option');
      o.value=i;o.textContent=`After ${i+1}. ${t.name}`;
      if(i===M.insertAfterIdx)o.selected=true;
      sel.appendChild(o);
    });
    // Auto-select last item by default (append)
    if(M.insertAfterIdx<0||M.insertAfterIdx>=S.today.tasks.length){
      sel.value=S.today.tasks.length-1;
    }
  } else {
    insertRow.style.display='none';
  }

  // Template quick-add section (always shown)
  buildAmTmplSection(fromTab);

  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('am_name').focus(),200);
}

function openEditTask(i){

function buildAmTmplSection(fromTab){

// Live calc: start+end→dur | start+dur→show end
function amCalc(){
  const startTs=parseTime(document.getElementById('am_start').value);
  const endTs=parseTime(document.getElementById('am_end').value);
  const dur=parseInt(document.getElementById('am_dur').value);
  const hint=document.getElementById('am_hint');
  if(startTs&&endTs&&endTs>startTs){
    const calc=Math.round((endTs-startTs)/60);
    document.getElementById('am_dur').value=calc;
    hint.className='hint-box green';hint.textContent=`Duration: ${fmtMins(calc)}`;hint.style.display='block';
  } else if(startTs&&dur>0){
    hint.className='hint-box';hint.textContent=`Ends at ${toTimeStr(startTs+dur*60)}`;hint.style.display='block';
  } else hint.style.display='none';
}

function amSave(){
  const name=document.getElementById('am_name').value.trim();
  if(!name){alert('Please enter a task name.');return;}
  const startTs=parseTime(document.getElementById('am_start').value);
  const endTs=parseTime(document.getElementById('am_end').value);
  let dur=parseInt(document.getElementById('am_dur').value);
  if(startTs&&endTs&&endTs>startTs) dur=Math.round((endTs-startTs)/60);
  if(!dur||dur<1){alert('Please enter a duration, or a start and end time.');return;}

  // Editing existing
  if(M.editIdx>=0){
    const t=S.today.tasks[M.editIdx];
    t.name=name;t.dur=dur;
    if(startTs&&M.editIdx===0){S.today.startedAt=startTs;t.startAt=startTs;}
    saveToday();closeModal('addModal');render();return;
  }

  // Determine target & insert position
  const target=M.fromTab==='plan_tomorrow'?'tomorrow':'today';
  let tasks=target==='today'?(S.today?S.today.tasks:[]):(S.tomorrow?S.tomorrow.tasks:[]);
  let afterIdx;
  if(M.fromTab==='schedule'||M.fromTab==='focus'){
    afterIdx=parseInt(document.getElementById('am_after').value);
  } else {
    afterIdx=tasks.length-1; // append
  }

  // If a specific start time was given, check if there's a gap before it
  if(startTs&&tasks.length>0){
    const times=scheduleTimes(tasks);
    // Find position based on start time
    let bestPos=-1;
    for(let i=0;i<times.length;i++){
      if(times[i].end&&times[i].end<=startTs) bestPos=i;
    }
    afterIdx=bestPos;
    // Check gap
    const prevEnd=bestPos>=0&&times[bestPos]?times[bestPos].end:null;
    if(prevEnd&&startTs>prevEnd+60){
      const gapMins=Math.round((startTs-prevEnd)/60);
      showToast(`⏳ ${fmtMins(gapMins)} of free time before this task`);
    }
  }

  // Conflict check
  const times=scheduleTimes(tasks);
  const insertPos=afterIdx<0?0:afterIdx+1;
  const prevEnd=insertPos>0&&times[insertPos-1]?times[insertPos-1].end:null;
  const nextStart=insertPos<times.length&&times[insertPos]?times[insertPos].start:null;
  if(prevEnd&&nextStart&&prevEnd+dur*60>nextStart+60){
    M.conflictPending={name,dur,startTs,afterIdx,target,conflictIdx:insertPos};
    document.getElementById('conflictInfo').textContent=
      `"${name}" (${fmtMins(dur)}) would overlap with "${tasks[insertPos]?tasks[insertPos].name:'next task'}".`;
    closeModal('addModal');
    document.getElementById('conflictModal').classList.add('open');
    return;
  }

  doInsert(name,dur,startTs,afterIdx,target);
}

function doInsert(name,dur,startTs,afterIdx,target){
  const task={id:uid(),name,dur,done:false,startAt:null};
  let isNew=false;
  if(target==='today'){
    if(!S.today){S.today={tasks:[],startedAt:nowSec()};isNew=true;}
    if(afterIdx<0)S.today.tasks.unshift(task);
    else S.today.tasks.splice(afterIdx+1,0,task);
    const insertedIdx=afterIdx<0?0:afterIdx+1;
    if(insertedIdx<=S.currentIdx&&!isNew)S.currentIdx++;
    if(insertedIdx===0&&startTs){S.today.startedAt=startTs;task.startAt=startTs;}
    if(isNew||S.today.tasks.length===1){
      S.currentIdx=0;
      if(!task.startAt)task.startAt=nowSec();
      S.today.startedAt=task.startAt;S.paused=false;
    }
    // If start time given, anchor it
    if(startTs&&!task.startAt&&insertedIdx===0){task.startAt=startTs;S.today.startedAt=startTs;}
    checkAndNotifyGaps(S.today.tasks);
    saveToday();
  } else {
    if(!S.tomorrow)S.tomorrow={tasks:[],startedAt:null};
    if(afterIdx<0)S.tomorrow.tasks.unshift(task);
    else S.tomorrow.tasks.splice(afterIdx+1,0,task);
    if(startTs&&S.tomorrow.tasks.indexOf(task)===0)S.tomorrow.startedAt=startTs;
    sv('tomorrow',S.tomorrow);
  }
  closeModal('addModal');render();
}

// Conflict handlers
function conflictEditNew(){
  closeModal('conflictModal');
  document.getElementById('am_name').value=M.conflictPending.name;
  document.getElementById('am_dur').value=M.conflictPending.dur;

}
function conflictDeleteNew(){M.conflictPending=null;closeModal('conflictModal');render();}
function conflictDeleteExisting(){
  const{target,conflictIdx,name,dur,startTs,afterIdx}=M.conflictPending;
  const tasks=target==='today'?S.today.tasks:S.tomorrow.tasks;
  tasks.splice(conflictIdx,1);
  if(target==='today'&&conflictIdx<=S.currentIdx)S.currentIdx=Math.max(0,S.currentIdx-1);
  M.conflictPending=null;closeModal('conflictModal');
  doInsert(name,dur,startTs,afterIdx,target);
}

function applyNameChange(i,v){M.applyTasks[i].name=v.trim()||M.applyTasks[i].name;}
function applyDurChange(i,v){M.applyTasks[i].dur=parseInt(v)||M.applyTasks[i].dur;}
function applyDup(i){M.applyTasks.splice(i+1,0,{...M.applyTasks[i]});renderApplyList();}
function applyDel(i){M.applyTasks.splice(i,1);renderApplyList();}
function applyCalc(){
  const startStr=document.getElementById('apply_start').value;
  const startTs=parseTime(startStr);
  const total=M.applyTasks.reduce((a,b)=>a+b.dur,0);
  const hint=document.getElementById('apply_hint');
  if(startTs){
    hint.textContent=`${M.applyTasks.length} tasks · ${fmtMins(total)} · starts ${toTimeStr(startTs)} → ends ${toTimeStr(startTs+total*60)}`;
    hint.style.display='block';
  } else {
    hint.textContent=`${M.applyTasks.length} tasks · ${fmtMins(total)} total`;hint.style.display='block';
  }
}
function applyTemplateSave(){
  if(!M.applyTasks.length){alert('Add at least one task.');return;}
  const startStr=document.getElementById('apply_start').value;
  const startTs=parseTime(startStr);
  if(!startTs){alert('Please set a start time for the template.');return;}
  const tasks=M.applyTasks.map((t,i)=>({
    id:uid(),name:t.name,dur:t.dur,done:false,
    startAt:i===0?startTs:null
  }));
  const target=M.applyTarget;
  if(target==='today'){
    if(!S.today||!S.today.tasks.length){
      S.today={tasks,startedAt:startTs};S.currentIdx=0;S.paused=false;
    } else {
      // Check gap between existing last task and new template start
      const existingTimes=scheduleTimes(S.today.tasks);
      const lastEnd=existingTimes.length?existingTimes[existingTimes.length-1].end:null;
      if(lastEnd&&startTs>lastEnd+60){
        const gapMins=Math.round((startTs-lastEnd)/60);
        showToast(`⏳ ${fmtMins(gapMins)} gap before this template starts`);
      }
      tasks.forEach(t=>S.today.tasks.push(t));
    }
    checkAndNotifyGaps(S.today.tasks);
    saveToday();
  } else {
    if(!S.tomorrow){S.tomorrow={tasks:[],startedAt:startTs};}
    else{S.tomorrow.startedAt=startTs;}
    tasks.forEach(t=>S.tomorrow.tasks.push(t));
    sv('tomorrow',S.tomorrow);
  }
  closeModal('applyModal');render();
}

function openRecovery(){

  document.getElementById('recoveryModal').classList.add('open');

function recoverContinue(){S.recoveryShown=true;closeModal('recoveryModal');render();}
function recoverSkip(){
  const now=nowSec();let cursor=S.today.startedAt||0;
  for(let i=0;i<S.today.tasks.length;i++){
    cursor+=S.today.tasks[i].dur*60;
    if(cursor>now){for(let j=S.currentIdx;j<i;j++)S.today.tasks[j].done=true;S.currentIdx=i;break;}
  }
  startCurrentTask();saveToday();S.recoveryShown=true;closeModal('recoveryModal');render();
}
function recoverShift(){
  const t=cur();if(t)t.startAt=nowSec();
  let newStartedAt=nowSec();
  for(let i=0;i<S.currentIdx;i++)newStartedAt-=S.today.tasks[i].dur*60;
  S.today.startedAt=newStartedAt;
  saveToday();S.recoveryShown=true;closeModal('recoveryModal');render();
}

// ─── TICK ──────────────────────────────────────────────────────
function startTick(){
  if(tickInterval)clearInterval(tickInterval);
  tickInterval=setInterval(()=>{
    if(S.screen!=='focus')return;
    const t=cur();if(!t||S.paused||t.name.toLowerCase()==='sleep')return;
    const sec=getSecondsLeft();
    const el=document.getElementById('timer-display');if(el)el.textContent=fmt(sec);
    const ring=document.getElementById('ring-prog');
    if(ring){
      ring.style.strokeDashoffset=565-(Math.max(0,Math.min(1,1-(sec/(t.dur*60))))*565);
      ring.style.stroke=sec<120?'var(--red)':sec<300?'var(--amber)':'var(--accent)';
    }
    if(sec<=0&&!S.paused){
      if(lastNotifTask!==S.currentIdx){
        lastNotifTask=S.currentIdx;
        const next=nxt();
        sendNotif(`⏱ ${t.name} is done!`,next?`Up next: ${next.name} (${fmtMins(next.dur)})`:'All done for now!');
      }
      advanceTask();
    }
  },1000);
}
